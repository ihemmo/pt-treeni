<style>
:root{--bg:#0a0a0a;--card:#141414;--card2:#1a1a1a;--border:#252525;--text:#e8e8e8;--muted:#666;--accent:#ff3e00;--accent2:#ff6b3d;--green:#00e676;--yellow:#ffd600;--blue:#40c4ff;--done-bg:#0d1a0d;--done-text:#2a5a2a}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:'IBM Plex Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;padding:0;overflow-x:hidden}
#app{max-width:500px;margin:0 auto;padding:16px;padding-top:max(16px,env(safe-area-inset-top));padding-bottom:max(140px,calc(env(safe-area-inset-bottom)+140px));min-height:100vh}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:70vh;gap:16px}
.title{font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:var(--accent)}
.btn{padding:12px 24px;border-radius:10px;border:2px solid var(--border);background:var(--card);color:var(--text);font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.95)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-size:18px;padding:16px 40px}
.btn.green{background:var(--green);border-color:var(--green);color:#000}
.btn.danger{border-color:#600;color:#f44}
.btn.blue{background:var(--blue);border-color:var(--blue);color:#000}
.btn.full{width:100%}
.btn.sm{padding:8px 14px;font-size:11px}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--accent)}
.hdr-title{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--accent)}
.hdr-sub{font-size:10px;color:var(--muted);margin-top:2px}
.hdr-back{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px 8px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px}
.label{font-family:'Oswald',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px;text-transform:uppercase}
.input{width:100%;padding:10px 12px;border-radius:6px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;outline:none}
.input:focus{border-color:var(--accent)}
.input-sm{padding:8px 10px;font-size:12px}
.input-label{font-size:10px;color:var(--muted);margin-bottom:4px;display:block}
.input-group{margin-bottom:10px}
.narrow{max-width:55px}
.tabs{display:flex;gap:2px;margin-bottom:14px;background:var(--card);border-radius:8px;padding:3px;border:1px solid var(--border)}
.tab{flex:1;padding:8px;text-align:center;font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);cursor:pointer;border-radius:6px;border:none;background:none}
.tab.active{background:var(--accent);color:#fff}
.prog-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:8px;cursor:pointer;transition:all .15s;position:relative}
.prog-card:active{transform:scale(.98);border-color:var(--accent)}
.prog-card-name{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;color:var(--text);margin-bottom:2px;padding-right:80px}
.prog-card-info{font-size:10px;color:var(--muted)}
.prog-card-tag{display:inline-block;font-size:8px;padding:2px 6px;border-radius:3px;background:var(--card2);color:var(--muted);border:1px solid var(--border);margin-right:3px;margin-top:4px}
.prog-card-actions{position:absolute;top:12px;right:12px;display:flex;gap:4px}
.abtn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);font-size:11px;padding:4px 8px;cursor:pointer;font-family:'IBM Plex Mono',monospace}
.abtn.del{color:#800;border-color:#400}
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--card);border-radius:6px;margin-bottom:4px;font-size:11px;border:1px solid var(--border)}
.exi{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:6px}
.exi-name{font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;color:var(--text)}
.exi-cat{font-size:9px;color:var(--muted)}
.exi-params{display:flex;gap:4px;margin-top:6px;align-items:center;flex-wrap:wrap;font-size:10px;color:var(--muted)}
.exi-params label{white-space:nowrap}
.exi-actions{display:flex;gap:4px;margin-top:6px;justify-content:flex-end}
.lib-cat{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;color:var(--accent);padding:10px 0 6px;border-top:1px solid var(--border);margin-top:6px;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
.lib-cat:first-child{border-top:none;margin-top:0}
.lib-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;margin:2px 0;border-radius:6px;background:var(--card2);border:1px solid var(--border);cursor:pointer;font-size:12px;transition:all .15s}
.lib-item:active{border-color:var(--accent);transform:scale(.98)}
.lib-item.added{opacity:.4}
.lib-add{color:var(--green);font-size:16px;font-weight:700}
.prep-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:13px}
.prep-weight{font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;color:var(--blue)}
.prep-count{font-size:11px;color:var(--muted)}
.w-progress{display:flex;gap:3px;margin:0 0 8px}
.w-dot{flex:1;height:4px;border-radius:2px;background:var(--card2)}
.w-dot.done{background:var(--green)}.w-dot.current{background:var(--accent)}
.w-total{text-align:center;font-size:11px;color:var(--muted);margin-bottom:16px;font-variant-numeric:tabular-nums}
.w-phase{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;text-align:center;margin-bottom:4px}
.w-phase.work{color:var(--accent)}.w-phase.rest{color:var(--green)}
.w-name{font-family:'Oswald',sans-serif;font-size:34px;font-weight:700;color:#fff;text-align:center;margin:8px 0 4px;line-height:1.1}
.w-detail{font-size:11px;color:var(--muted);text-align:center;margin-bottom:4px}
.w-weight{font-size:13px;color:var(--blue);text-align:center;margin-bottom:12px;font-weight:600}
.w-ring{width:200px;height:200px;margin:0 auto;position:relative;display:flex;align-items:center;justify-content:center}
.w-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}
.w-ring-time{font-family:'Oswald',sans-serif;font-size:64px;font-weight:700;font-variant-numeric:tabular-nums;z-index:1}
.w-ring-time.warn{color:var(--yellow)}
.w-timer-rest{font-family:'Oswald',sans-serif;font-size:72px;font-weight:700;text-align:center;color:var(--green);font-variant-numeric:tabular-nums;margin:20px 0}
.w-next{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-top:16px;text-align:center}
.w-next-label{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.w-next-name{font-family:'Oswald',sans-serif;font-size:18px;color:var(--text)}
.w-next-weight{font-size:11px;color:var(--blue);margin-top:2px}
.stat-row{display:flex;gap:8px;margin-bottom:12px}
.stat-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.stat-val{font-family:'Oswald',sans-serif;font-size:24px;font-weight:600;color:var(--accent)}
.stat-label{font-size:9px;color:var(--muted);margin-top:2px}
.bottom{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent,var(--bg) 25%);padding:16px 16px max(16px,env(safe-area-inset-bottom));display:flex;justify-content:center;gap:10px;z-index:20}
</style>
</head>

/* ========== STORAGE + INIT ========== */
function getLib(){try{var d=JSON.parse(store.get('pt3_lib'));return(d&&d.length)?d:null;}catch(e){return null;}}
function saveLib(l){store.set('pt3_lib',JSON.stringify(l));}
function initLib(){if(!getLib())saveLib(JSON.parse(JSON.stringify(DEFAULT_LIB)));}
initLib();
function getPrograms(){try{var d=JSON.parse(store.get('pt3_progs'));return(d&&d.length)?d:null;}catch(e){return null;}}
function savePrograms(p){store.set('pt3_progs',JSON.stringify(p));}
function initPrograms(){if(!getPrograms())savePrograms(JSON.parse(JSON.stringify(DEFAULT_PROGRAMS)));}
function getHistory(){try{return JSON.parse(store.get('pt3_hist')||'[]');}catch(e){return[];}}
function saveHistory(e){var h=getHistory();h.unshift(e);if(h.length>200)h.length=200;store.set('pt3_hist',JSON.stringify(h));}
initPrograms();

function pad2(n){return n<10?'0'+n:''+n;}
function uid(){return 'p_'+Date.now()+'_'+Math.random().toString(36).substr(2,5);}
function fD(ms){var s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);if(h>0)return h+':'+pad2(m%60)+':'+pad2(s%60);return m+':'+pad2(s%60);}
function fT(d){return pad2(d.getHours())+':'+pad2(d.getMinutes());}
function fDF(d){return d.getDate()+'.'+(d.getMonth()+1)+'.'+d.getFullYear();}
function esc(s){if(!s)return '';var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function equipText(ex){var p=[];if(ex.weight)p.push(ex.weight+' kg');if(ex.kpl>1)p.push(ex.kpl+' kpl');else if(ex.kpl===1)p.push('1 kpl');return p.join(' \u00d7 ');}
function speakExercise(ex,sec){var t=ex.name+'. ';if(ex.weight){t+=ex.weight+' kiloa. ';if(ex.kpl>1)t+=ex.kpl+' kappaletta. ';}t+=sec+' sekuntia.';speak(t);}
function getEquipmentList(exercises){
  var g={};for(var i=0;i<exercises.length;i++){var ex=exercises[i];if(!ex.weight||ex.weight<=0)continue;var c=ex.cat||'Muu';var k=c+'|'+ex.weight+'|'+(ex.kpl||1);if(!g[k])g[k]={cat:c,weight:ex.weight,kpl:ex.kpl||1,names:[]};if(g[k].names.indexOf(ex.name)<0)g[k].names.push(ex.name);}
  var l=[];for(var j in g)l.push(g[j]);l.sort(function(a,b){return a.cat<b.cat?-1:a.cat>b.cat?1:a.weight-b.weight;});return l;}

function goHome(){view='home';stopWorkout();render();}
function goEdit(prog){editProg=prog?JSON.parse(JSON.stringify(prog)):{id:uid(),name:'Uusi ohjelma',workSec:45,restSec:10,exercises:[]};libSearch='';libCat='';view='edit';render();}
function goLib(){view='lib';libSearch='';libCat='';render();}
function goPrep(progId){var progs=getPrograms()||[];prepProg=null;for(var i=0;i<progs.length;i++){if(progs[i].id===progId){prepProg=progs[i];break;}}if(!prepProg)return;view='prep';render();}
function saveProg(){if(!editProg.name.trim())return;editProg.exercises=editProg.exercises.filter(function(e){return e.name.trim();});if(!editProg.exercises.length)return;var progs=getPrograms()||[];var idx=-1;for(var i=0;i<progs.length;i++){if(progs[i].id===editProg.id){idx=i;break;}}if(idx>=0)progs[idx]=editProg;else progs.push(editProg);savePrograms(progs);goHome();}
function clearAllTimers(){clearInterval(timer);timer=null;}
function stopWorkout(){clearAllTimers();W.phase='idle';try{speechSynthesis.cancel();}catch(e){}}

function startWorkout(progId){
  initAudio();var progs=getPrograms()||[];var prog=null;
  for(var i=0;i<progs.length;i++){if(progs[i].id===progId){prog=progs[i];break;}}
  if(!prog||!prog.exercises.length)return;
  W={phase:'active',progName:prog.name,exercises:prog.exercises,workSec:prog.workSec||45,restSec:prog.restSec||10,exIdx:0,mode:'countdown',timeLeft:5,totalStart:Date.now(),exDurs:[]};
  view='workout';speak('Treeni alkaa. Valmistaudu.');clearAllTimers();timer=setInterval(tick,1000);render();}

function tick(){
  W.timeLeft=W.timeLeft-1;var ex=W.exercises[W.exIdx];var exSec=(ex.sec&&ex.sec>0)?ex.sec:W.workSec;
  if(W.mode==='countdown'){if(W.timeLeft<=0){W.mode='work';W.timeLeft=exSec;speakExercise(ex,exSec);longBeep();}else if(W.timeLeft<=3)shortBeep();}
  else if(W.mode==='work'){if(W.timeLeft<=0){W.exDurs.push({name:ex.name,dur:exSec*1000});if(W.exIdx>=W.exercises.length-1){finishWorkout();return;}W.mode='rest';W.timeLeft=W.restSec;longBeep();var next=W.exercises[W.exIdx+1];var msg='Tauko. Seuraavaksi: '+next.name+'.';if(next.weight)msg+=' '+next.weight+' kiloa.';speak(msg);}else if(W.timeLeft<=5){shortBeep();if(W.timeLeft===5)speak('Viisi');}}
  else if(W.mode==='rest'){if(W.timeLeft<=0){W.exIdx++;ex=W.exercises[W.exIdx];exSec=(ex.sec&&ex.sec>0)?ex.sec:W.workSec;W.mode='work';W.timeLeft=exSec;longBeep();speakExercise(ex,exSec);}else if(W.timeLeft<=3)shortBeep();}
  render();}

function finishWorkout(){clearAllTimers();W.phase='finished';var dur=Date.now()-W.totalStart;speak('Treeni valmis! Kokonaisaika '+Math.floor(dur/60000)+' minuuttia. Hienoa!');longBeep();setTimeout(function(){longBeep();},300);saveHistory({date:new Date().toISOString(),dur:dur,progName:W.progName,count:W.exercises.length});render();}
function skipEx(){var ex=W.exercises[W.exIdx];var exSec=(ex.sec&&ex.sec>0)?ex.sec:W.workSec;if(W.mode==='work'){W.exDurs.push({name:ex.name,dur:(exSec-W.timeLeft)*1000});if(W.exIdx>=W.exercises.length-1){finishWorkout();return;}W.mode='rest';W.timeLeft=W.restSec;speak('Ohitettu. Seuraavaksi: '+W.exercises[W.exIdx+1].name+'.');}else if(W.mode==='rest'){W.exIdx++;var ex2=W.exercises[W.exIdx];var s2=(ex2.sec&&ex2.sec>0)?ex2.sec:W.workSec;W.mode='work';W.timeLeft=s2;longBeep();speakExercise(ex2,s2);}render();}

/* ========== EVENTS ========== */
document.addEventListener('click',function(e){
  var t=e.target.closest('[data-action]');if(!t)return;
  var a=t.getAttribute('data-action'),v=t.getAttribute('data-val')||'',v2=t.getAttribute('data-val2')||'';
  e.stopPropagation();
  if(a==='start')goPrep(v);
  else if(a==='startfromprep')startWorkout(v);
  else if(a==='tab'){homeTab=v;render();}
  else if(a==='edit'){var ps=getPrograms()||[];for(var i=0;i<ps.length;i++){if(ps[i].id===v){goEdit(ps[i]);break;}}}
  else if(a==='dup'){var ps2=getPrograms()||[];for(var j=0;j<ps2.length;j++){if(ps2[j].id===v){var c=JSON.parse(JSON.stringify(ps2[j]));c.id=uid();c.name+=' (kopio)';ps2.push(c);savePrograms(ps2);render();break;}}}
  else if(a==='del'){var ps3=(getPrograms()||[]).filter(function(p){return p.id!==v;});savePrograms(ps3);render();}
  else if(a==='newedit')goEdit(null);
  else if(a==='back')goHome();
  else if(a==='save')saveProg();
  else if(a==='lib')goLib();
  else if(a==='libcat'){libCat=libCat===v?'':v;render();}
  else if(a==='libadd'){var lib=getLib();var le=lib[+v].exercises[+v2];editProg.exercises.push({name:le.name,detail:le.detail,cat:lib[+v].cat,weight:0,kpl:0,sec:0});render();}
  else if(a==='libback'){view='edit';render();}
  else if(a==='remex'){editProg.exercises.splice(+v,1);render();}
  else if(a==='moveex'){var idx=+v,dir=+v2;var exs=editProg.exercises;var tmp=exs[idx];exs[idx]=exs[idx+dir];exs[idx+dir]=tmp;render();}
  else if(a==='stop'){stopWorkout();goHome();}
  else if(a==='skip')skipEx();
  else if(a==='reset')goHome();
  else if(a==='clearhist'){store.del('pt3_hist');render();}
  else if(a==='libedit'){editLibCat=+v;editLibEx=+v2;render();}
  else if(a==='libnew'){editLibCat=+v;editLibEx=-1;render();}
  else if(a==='libsaveex'){var ni=document.getElementById('libedit_name'),di=document.getElementById('libedit_detail');if(ni&&ni.value.trim()){var lib2=getLib();if(editLibEx>=0)lib2[editLibCat].exercises[editLibEx]={name:ni.value.trim(),detail:di?di.value:''};else lib2[editLibCat].exercises.push({name:ni.value.trim(),detail:di?di.value:''});saveLib(lib2);editLibCat=-1;editLibEx=-1;}render();}
  else if(a==='libdelex'){var lib3=getLib();lib3[+v].exercises.splice(+v2,1);saveLib(lib3);render();}
  else if(a==='libcanceledit'){editLibCat=-1;editLibEx=-1;render();}
});
document.addEventListener('change',function(e){var t=e.target,b=t.getAttribute('data-bind');if(!b)return;var idx=t.getAttribute('data-idx');if(b==='progname')editProg.name=t.value;else if(b==='worksec')editProg.workSec=+t.value||45;else if(b==='restsec')editProg.restSec=+t.value||10;else if(b==='exweight')editProg.exercises[+idx].weight=+t.value||0;else if(b==='exkpl')editProg.exercises[+idx].kpl=+t.value||0;else if(b==='exsec')editProg.exercises[+idx].sec=+t.value||0;});
document.addEventListener('input',function(e){if(e.target.getAttribute('data-bind')==='libsearch'){libSearch=e.target.value.toLowerCase();render();}});

/* ========== RENDER ========== */
function render(){var app=document.getElementById('app'),btm=document.getElementById('btm');btm.style.display='none';try{if(view==='home')renderHome(app);else if(view==='edit')renderEdit(app);else if(view==='lib')renderLib(app);else if(view==='prep')renderPrep(app,btm);else if(view==='workout')renderWorkout(app,btm);}catch(err){app.innerHTML='<div style="padding:20px;color:#f88">'+esc(err.message)+'</div>';}}

function renderHome(app){
  var progs=getPrograms()||[],hist=getHistory();
  var h='<div style="text-align:center;margin:20px 0 12px"><span style="font-size:48px">\u{1F4AA}</span></div>';
  h+='<div style="font-family:Oswald,sans-serif;font-size:28px;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:var(--accent);text-align:center;margin-bottom:20px">Personal Trainer</div>';
  h+='<div class="tabs"><button class="tab'+(homeTab==='programs'?' active':'')+'" data-action="tab" data-val="programs">Ohjelmat ('+progs.length+')</button>';
  h+='<button class="tab'+(homeTab==='history'?' active':'')+'" data-action="tab" data-val="history">Historia</button></div>';
  if(homeTab==='programs'){
    for(var i=0;i<progs.length;i++){
      var p=progs[i],tt=0;for(var j=0;j<p.exercises.length;j++){tt+=((p.exercises[j].sec&&p.exercises[j].sec>0)?p.exercises[j].sec:(p.workSec||45));}tt+=(p.exercises.length-1)*(p.restSec||10);
      h+='<div class="prog-card" data-action="start" data-val="'+esc(p.id)+'">';
      h+='<div class="prog-card-actions"><button class="abtn" data-action="edit" data-val="'+esc(p.id)+'">\u270F\uFE0F</button>';
      h+='<button class="abtn" data-action="dup" data-val="'+esc(p.id)+'">\u{1F4CB}</button>';
      if(progs.length>1)h+='<button class="abtn del" data-action="del" data-val="'+esc(p.id)+'">\u{1F5D1}</button>';
      h+='</div><div class="prog-card-name">'+esc(p.name)+'</div>';
      h+='<div class="prog-card-info">'+p.exercises.length+' liikett\u00e4 \u00b7 ~'+Math.ceil(tt/60)+' min</div>';
      if(p.tag)h+='<div class="prog-card-tag">'+esc(p.tag)+'</div>';
      h+='</div>';}
    h+='<button class="btn full" style="margin-top:8px" data-action="newedit">+ Uusi ohjelma</button>';
  }else{
    if(hist.length>0){for(var k=0;k<hist.length;k++){var hi=hist[k],d=new Date(hi.date);h+='<div class="hist-item"><span>'+fDF(d)+' '+fT(d)+'<br><span style="color:var(--muted);font-size:10px">'+esc(hi.progName)+'</span></span><span style="color:var(--muted)">'+fD(hi.dur)+'</span></div>';}h+='<div style="text-align:center;padding:10px"><button class="btn sm danger" data-action="clearhist">Tyhjenn\u00e4</button></div>';}
    else h+='<div style="text-align:center;color:var(--muted);padding:40px;font-size:12px">Ei treenej\u00e4 viel\u00e4</div>';}
  app.innerHTML=h;}

function renderPrep(app,btm){
  var p=prepProg;if(!p){goHome();return;}var equip=getEquipmentList(p.exercises);
  var tt=0;for(var i=0;i<p.exercises.length;i++){tt+=((p.exercises[i].sec&&p.exercises[i].sec>0)?p.exercises[i].sec:(p.workSec||45));}tt+=(p.exercises.length-1)*(p.restSec||10);
  var h='<div class="hdr"><button class="hdr-back" data-action="back">\u2190</button><div><div class="hdr-title">'+esc(p.name)+'</div><div class="hdr-sub">'+p.exercises.length+' liikett\u00e4 \u00b7 ~'+Math.ceil(tt/60)+' min</div></div></div>';
  if(equip.length>0){h+='<div class="label">\u{1F3CB}\uFE0F Varaa v\u00e4lineet valmiiksi</div>';
    for(var j=0;j<equip.length;j++){var eq=equip[j];h+='<div class="prep-item"><div><div style="font-size:12px;color:var(--text)">'+esc(eq.cat)+'</div><div style="font-size:9px;color:var(--muted)">'+esc(eq.names.join(', '))+'</div></div><div style="text-align:right"><div class="prep-weight">'+eq.weight+' kg</div><div class="prep-count">'+eq.kpl+' kpl</div></div></div>';}}
  else h+='<div class="card" style="text-align:center;color:var(--muted);font-size:12px">\u{1F9CD} Ei v\u00e4lineit\u00e4 \u2013 oman kehon painolla</div>';
  h+='<div class="label" style="margin-top:16px">\u{1F4CB} Liikkeet</div>';
  for(var k=0;k<p.exercises.length;k++){var ex=p.exercises[k],exSec=(ex.sec&&ex.sec>0)?ex.sec:(p.workSec||45);h+='<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:12px;border-bottom:1px solid var(--border)"><span style="color:var(--text)">'+(k+1)+'. '+esc(ex.name)+'</span><span style="color:var(--muted)">'+exSec+'s'+(ex.weight?' \u00b7 '+ex.weight+'kg':'')+'</span></div>';}
  h+='<div style="height:120px"></div>';
  btm.style.display='flex';btm.innerHTML='<button class="btn danger" data-action="back">Takaisin</button><button class="btn primary" data-action="startfromprep" data-val="'+esc(p.id)+'">Aloita \u{1F525}</button>';
  app.innerHTML=h;}

function renderEdit(app){
  var p=editProg;
  var h='<div class="hdr"><button class="hdr-back" data-action="back">\u2190</button><div style="flex:1"><div class="hdr-title">Muokkaa</div></div><button class="btn sm green" data-action="save">Tallenna</button></div>';
  h+='<div class="input-group"><label class="input-label">Ohjelman nimi</label><input class="input" value="'+esc(p.name)+'" data-bind="progname"></div>';
  h+='<div style="display:flex;gap:8px;margin-bottom:14px"><div class="input-group" style="flex:1"><label class="input-label">Ty\u00f6aika (s)</label><input class="input input-sm" type="number" inputmode="numeric" value="'+(p.workSec||45)+'" data-bind="worksec"></div>';
  h+='<div class="input-group" style="flex:1"><label class="input-label">Lepo (s)</label><input class="input input-sm" type="number" inputmode="numeric" value="'+(p.restSec||10)+'" data-bind="restsec"></div></div>';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div class="label" style="margin:0">Liikkeet ('+p.exercises.length+')</div><button class="btn sm blue" data-action="lib">+ Lis\u00e4\u00e4</button></div>';
  for(var i=0;i<p.exercises.length;i++){var ex=p.exercises[i];h+='<div class="exi"><div class="exi-name">'+(i+1)+'. '+esc(ex.name)+'</div>';if(ex.cat)h+='<div class="exi-cat">'+esc(ex.cat)+'</div>';h+='<div class="exi-params"><label>kg</label><input class="input input-sm narrow" type="number" inputmode="numeric" value="'+(ex.weight||'')+'" data-bind="exweight" data-idx="'+i+'" placeholder="0"><label>kpl</label><input class="input input-sm narrow" type="number" inputmode="numeric" value="'+(ex.kpl||'')+'" data-bind="exkpl" data-idx="'+i+'" placeholder="0"><label>sek</label><input class="input input-sm narrow" type="number" inputmode="numeric" value="'+(ex.sec||'')+'" data-bind="exsec" data-idx="'+i+'" placeholder="'+(p.workSec||45)+'"></div><div class="exi-actions">';if(i>0)h+='<button class="abtn" data-action="moveex" data-val="'+i+'" data-val2="-1">\u2191</button>';if(i<p.exercises.length-1)h+='<button class="abtn" data-action="moveex" data-val="'+i+'" data-val2="1">\u2193</button>';h+='<button class="abtn del" data-action="remex" data-val="'+i+'">\u2715</button></div></div>';}
  if(!p.exercises.length)h+='<div style="text-align:center;color:var(--muted);padding:30px;font-size:12px">Lis\u00e4\u00e4 liikkeit\u00e4 + painikkeella</div>';
  h+='<div style="height:30px"></div>';app.innerHTML=h;}

function renderLib(app){
  var lib=getLib();
  var h='<div class="hdr"><button class="hdr-back" data-action="libback">\u2190</button><div style="flex:1"><div class="hdr-title">Liikekirjasto</div></div></div>';
  h+='<div style="margin-bottom:12px"><input class="input" placeholder="\u{1F50D} Hae liikett\u00e4..." data-bind="libsearch" value="'+esc(libSearch)+'"></div>';
  var added={};if(editProg){for(var a=0;a<editProg.exercises.length;a++)added[editProg.exercises[a].name]=true;}
  if(editLibCat>=0){var isNew=editLibEx<0;var eName=isNew?'':lib[editLibCat].exercises[editLibEx].name;var eDetail=isNew?'':lib[editLibCat].exercises[editLibEx].detail;
    h+='<div class="card" style="border-color:var(--accent)"><div class="label">'+(isNew?'Uusi liike':'Muokkaa')+'</div><div class="input-group"><input id="libedit_name" class="input input-sm" placeholder="Nimi" value="'+esc(eName)+'"></div><div class="input-group"><input id="libedit_detail" class="input input-sm" placeholder="Kuvaus" value="'+esc(eDetail)+'"></div><div style="display:flex;gap:6px;justify-content:flex-end"><button class="btn sm" data-action="libcanceledit">Peruuta</button><button class="btn sm green" data-action="libsaveex">Tallenna</button></div></div>';}
  for(var ci=0;ci<lib.length;ci++){var cat=lib[ci];var filtered=[];for(var ei=0;ei<cat.exercises.length;ei++){var ex=cat.exercises[ei];if(libSearch&&ex.name.toLowerCase().indexOf(libSearch)<0&&(ex.detail||'').toLowerCase().indexOf(libSearch)<0)continue;filtered.push({ex:ex,ei:ei});}
    var isOpen=libCat===cat.cat||!!libSearch;
    h+='<div class="lib-cat" data-action="libcat" data-val="'+esc(cat.cat)+'">'+cat.icon+' '+esc(cat.cat)+' ('+cat.exercises.length+') '+(isOpen?'\u25BC':'\u25B6')+'</div>';
    if(isOpen){for(var fi=0;fi<filtered.length;fi++){var item=filtered[fi];var isA=!!added[item.ex.name];h+='<div class="lib-item'+(isA?' added':'')+'" style="position:relative"><div data-action="libadd" data-val="'+ci+'" data-val2="'+item.ei+'" style="flex:1;cursor:pointer"><div style="font-size:12px;color:var(--text)">'+esc(item.ex.name)+'</div><div style="font-size:9px;color:var(--muted)">'+esc(item.ex.detail)+'</div></div><div style="display:flex;gap:2px;align-items:center"><button class="abtn" data-action="libedit" data-val="'+ci+'" data-val2="'+item.ei+'" style="font-size:9px">\u270F</button><button class="abtn del" data-action="libdelex" data-val="'+ci+'" data-val2="'+item.ei+'" style="font-size:9px">\u2715</button><span class="lib-add" data-action="libadd" data-val="'+ci+'" data-val2="'+item.ei+'" style="cursor:pointer;padding:4px 8px">'+(isA?'\u2713':'+')+'</span></div></div>';}
      h+='<div style="padding:4px 0"><button class="abtn" data-action="libnew" data-val="'+ci+'" style="width:100%;text-align:center;padding:8px;border-style:dashed">+ Uusi liike</button></div>';}}
  h+='<div style="height:30px"></div>';app.innerHTML=h;}

function renderWorkout(app,btm){
  if(W.phase==='finished'){btm.style.display='none';var tot=Date.now()-W.totalStart;app.innerHTML='<div class="center"><div style="font-size:56px">\u{1F3C6}</div><div class="title">Valmis!</div><div class="stat-row"><div class="stat-card"><div class="stat-val">'+fD(tot)+'</div><div class="stat-label">Aika</div></div><div class="stat-card"><div class="stat-val">'+W.exercises.length+'</div><div class="stat-label">Liikett\u00e4</div></div></div><button class="btn primary" data-action="reset">Takaisin</button></div>';return;}
  btm.style.display='flex';var ex=W.exercises[W.exIdx];var exSec=(ex.sec&&ex.sec>0)?ex.sec:W.workSec;var isW=W.mode==='work',isR=W.mode==='rest',isC=W.mode==='countdown';var warn=isW&&W.timeLeft<=5;
  var h2='<div class="w-progress">';for(var i=0;i<W.exercises.length;i++){h2+='<div class="w-dot '+(i<W.exIdx?'done':i===W.exIdx?'current':'')+'"></div>';}h2+='</div><div class="w-total">'+esc(W.progName)+' \u00b7 '+(W.exIdx+1)+'/'+W.exercises.length+' \u00b7 '+fD(Date.now()-W.totalStart)+'</div>';
  if(isC){h2+='<div style="margin-top:40px"><div class="w-phase work">Valmistaudu</div><div class="w-name">'+esc(W.exercises[0].name)+'</div>';var et=equipText(W.exercises[0]);if(et)h2+='<div class="w-weight">'+esc(et)+'</div>';h2+='<div style="font-family:Oswald,sans-serif;font-size:100px;font-weight:700;text-align:center;margin:20px 0;color:var(--text)">'+W.timeLeft+'</div></div>';}
  else if(isW){h2+='<div style="margin-top:12px"><div class="w-phase work">\u{1F525} Ty\u00f6</div><div class="w-name">'+esc(ex.name)+'</div>';if(ex.detail)h2+='<div class="w-detail">'+esc(ex.detail)+'</div>';var et2=equipText(ex);if(et2)h2+='<div class="w-weight">'+esc(et2)+'</div>';var pct=W.timeLeft/exSec,r=90,cx=100,cy=100,circ=2*Math.PI*r;h2+='<div class="w-ring"><svg width="200" height="200"><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--card2)" stroke-width="8"/><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+(warn?'var(--yellow)':'var(--accent)')+'" stroke-width="8" stroke-dasharray="'+circ+'" stroke-dashoffset="'+(circ*(1-pct))+'" stroke-linecap="round"/></svg><div class="w-ring-time'+(warn?' warn':'')+'">'+W.timeLeft+'</div></div></div>';}
  else if(isR){h2+='<div style="margin-top:20px"><div class="w-phase rest">\u{1F9D8} Tauko</div><div class="w-timer-rest">'+W.timeLeft+'</div>';if(W.exIdx+1<W.exercises.length){var next=W.exercises[W.exIdx+1];h2+='<div class="w-next"><div class="w-next-label">Seuraavaksi</div><div class="w-next-name">'+esc(next.name)+'</div>';var nt=equipText(next);if(nt)h2+='<div class="w-next-weight">'+esc(nt)+'</div>';h2+='</div>';}h2+='</div>';}
  app.innerHTML=h2;btm.innerHTML='<button class="btn danger" data-action="stop">Lopeta</button><button class="btn sm" data-action="skip">Ohita \u2192</button>';}

render();
})();
</script>
</body>
